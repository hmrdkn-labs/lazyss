name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Format check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "not formatted:"
            echo "$out"
            exit 1
          fi

  vet:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Vet
        run: go vet ./...

  mod-tidy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Race tests
        run: go test -race -coverprofile=coverage.out ./...
      - name: Coverage summary and baseline
        run: |
          go tool cover -func=coverage.out | tee coverage.txt | tail -1
          python3 scripts/coverage_baseline.py verify --summary coverage.txt --baseline coverage.baseline
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            coverage.out
            coverage.txt

  script-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Python script tests
        run: python3 -m unittest discover -s scripts -p '*_test.py'

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build ./cmd/lazyss

  smoke-local:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install smoke test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y expect
      - name: Local binary and TUI smoke
        run: make smoke-local

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  govulncheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...

  ci-required:
    name: ci-required
    needs:
      - format
      - mod-tidy
      - vet
      - test
      - script-test
      - build
      - smoke-local
      - lint
      - govulncheck
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify required CI jobs
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = {
              name: meta.get("result", "unknown")
              for name, meta in needs.items()
              if meta.get("result") != "success"
          }
          if failed:
              for name, result in sorted(failed.items()):
                  print(f"{name}: {result}", file=sys.stderr)
              sys.exit(1)
          print("all required CI jobs passed")
          PY
