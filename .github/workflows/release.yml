name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Fetch main for release readiness
        run: git fetch --force origin main:refs/remotes/origin/main
      - name: Write live smoke evidence
        env:
          LAZYSS_LIVE_SMOKE_EVIDENCE_JSON: ${{ secrets.LAZYSS_LIVE_SMOKE_EVIDENCE_JSON }}
        run: |
          if [ -z "${LAZYSS_LIVE_SMOKE_EVIDENCE_JSON:-}" ]; then
            echo "::error ::LAZYSS_LIVE_SMOKE_EVIDENCE_JSON is required for release readiness."
            exit 2
          fi
          umask 077
          printf '%s' "$LAZYSS_LIVE_SMOKE_EVIDENCE_JSON" > live-smoke-evidence.json
      - name: Write optional private Homebrew evidence
        env:
          LAZYSS_HOMEBREW_PRIVATE_EVIDENCE_JSON: ${{ secrets.LAZYSS_HOMEBREW_PRIVATE_EVIDENCE_JSON }}
        run: |
          if [ -z "${LAZYSS_HOMEBREW_PRIVATE_EVIDENCE_JSON:-}" ]; then
            echo "LAZYSS_HOMEBREW_PRIVATE_EVIDENCE_JSON is not set; first-release pre-publish readiness will skip private cask install evidence."
            exit 0
          fi
          umask 077
          printf '%s' "$LAZYSS_HOMEBREW_PRIVATE_EVIDENCE_JSON" > homebrew-private-evidence.json
      - name: Release readiness audit
        env:
          GH_TOKEN: ${{ secrets.LAZYSS_RELEASE_READINESS_GITHUB_TOKEN }}
          LAZYSS_RELEASE_VERSION: ${{ github.ref_name }}
          LAZYSS_RELEASE_READINESS_MODE: tag
          LAZYSS_REQUIRE_HOMEBREW_PRIVATE_EVIDENCE: ${{ secrets.LAZYSS_HOMEBREW_PRIVATE_EVIDENCE_JSON != '' && '1' || '0' }}
          LAZYSS_REQUIRE_HOMEBREW_TAP_UPLOAD: "1"
          LAZYSS_SKIP_OPERATOR_RUNTIME_TOOL_CHECKS: "1"
          LAZYSS_HOMEBREW_READINESS_MODE: hosted
          LAZYSS_LIVE_SMOKE_EVIDENCE: live-smoke-evidence.json
          LAZYSS_HOMEBREW_PRIVATE_EVIDENCE: ${{ secrets.LAZYSS_HOMEBREW_PRIVATE_EVIDENCE_JSON != '' && 'homebrew-private-evidence.json' || '' }}
          LAZYSS_RELEASE_READINESS_JSON: release-readiness.json
          LAZYSS_RELEASE_READINESS_MARKDOWN: release-readiness.md
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error ::LAZYSS_RELEASE_READINESS_GITHUB_TOKEN is required for release readiness."
            exit 2
          fi
          ./scripts/release-readiness.sh
      - name: Upload release readiness reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-readiness-${{ github.ref_name }}
          path: |
            release-readiness.json
            release-readiness.md
          retention-days: 30
          if-no-files-found: warn
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
