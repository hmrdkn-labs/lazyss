name: Release Candidate

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/release-candidate.yml"
      - ".github/workflows/release.yml"
      - ".goreleaser.yaml"
      - "Makefile"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      reason: ${{ steps.decide.outputs.reason }}
    steps:
      - name: Decide whether release-candidate gates are required
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LABELS_JSON: ${{ github.event_name == 'pull_request' && toJson(github.event.pull_request.labels.*.name) || '[]' }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=$EVENT_NAME event" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s\n' "$LABELS_JSON" | python3 -c 'import json,sys; labels=json.load(sys.stdin); sys.exit(0 if any(label in {"release-candidate","release"} for label in labels) else 1)'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=release label" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json files --jq '.files[].path')"
          if printf '%s\n' "$changed_files" | grep -Eq '^(\.github/workflows/(release-candidate|release)\.yml|\.goreleaser\.yaml|Makefile|cmd/|internal/|go\.(mod|sum)|scripts/)'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=release-relevant files" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "reason=not release-relevant; add release-candidate label to force" >> "$GITHUB_OUTPUT"
          fi

  build-matrix:
    needs: classify
    if: needs.classify.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./cmd/lazyss

  goreleaser-snapshot:
    needs: classify
    if: needs.classify.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          install-only: true
      - name: GoReleaser check
        run: goreleaser check
      - name: GoReleaser snapshot
        run: goreleaser release --clean --snapshot --skip=publish
      - name: Verify snapshot artifacts
        run: python3 scripts/release_artifacts.py verify --dist dist
      - name: Upload GoReleaser snapshot artifacts
        uses: actions/upload-artifact@v7
        with:
          name: goreleaser-snapshot-${{ github.sha }}
          path: dist/**
          retention-days: 7
          if-no-files-found: error

  homebrew-readiness:
    needs: classify
    if: needs.classify.outputs.should_run == 'true'
    runs-on: macos-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
      - name: Homebrew readiness audit
        run: |
          set +e
          ./scripts/homebrew-readiness.sh
          rc=$?
          set -e
          echo "homebrew-readiness exit: $rc" >> "$GITHUB_STEP_SUMMARY"
          case "$rc" in
            0)
              echo "Homebrew readiness passed." >> "$GITHUB_STEP_SUMMARY"
              ;;
            2)
              echo "::warning ::Homebrew readiness has approval/external-state blockers."
              echo "Homebrew readiness has approval/external-state blockers." >> "$GITHUB_STEP_SUMMARY"
              ;;
            *)
              exit "$rc"
              ;;
          esac

  release-candidate-required:
    name: release-candidate-required
    needs:
      - classify
      - build-matrix
      - goreleaser-snapshot
      - homebrew-readiness
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify release-candidate jobs
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
          CLASSIFY_RESULT: ${{ needs.classify.result }}
          SHOULD_RUN: ${{ needs.classify.outputs.should_run }}
          REASON: ${{ needs.classify.outputs.reason }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          classify_result = os.environ.get("CLASSIFY_RESULT")
          should_run = os.environ.get("SHOULD_RUN")
          reason = os.environ.get("REASON", "unknown")
          needs = json.loads(os.environ["NEEDS_JSON"])

          if classify_result != "success":
              print(f"classify: {classify_result or 'missing'}", file=sys.stderr)
              sys.exit(1)

          if should_run != "true":
              print(f"release-candidate gates skipped: {reason}")
              sys.exit(0)

          required = ["classify", "build-matrix", "goreleaser-snapshot", "homebrew-readiness"]
          failed = {
              name: needs.get(name, {}).get("result", "missing")
              for name in required
              if needs.get(name, {}).get("result") != "success"
          }
          if failed:
              for name, result in sorted(failed.items()):
                  print(f"{name}: {result}", file=sys.stderr)
              sys.exit(1)
          print(f"release-candidate gates passed: {reason}")
          PY
