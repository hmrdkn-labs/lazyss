name: Release Candidate

on:
  pull_request:
    paths:
      - ".github/workflows/release-candidate.yml"
      - ".github/workflows/release.yml"
      - ".goreleaser.yaml"
      - "scripts/homebrew-readiness.sh"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/release-candidate.yml"
      - ".github/workflows/release.yml"
      - ".goreleaser.yaml"
      - "Makefile"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./cmd/lazyss

  goreleaser-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          install-only: true
      - name: GoReleaser check
        run: goreleaser check
      - name: GoReleaser snapshot
        run: goreleaser release --clean --snapshot --skip=publish

  homebrew-readiness:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
      - name: Homebrew readiness audit
        run: |
          set +e
          make homebrew-readiness
          rc=$?
          set -e
          echo "homebrew-readiness exit: $rc" >> "$GITHUB_STEP_SUMMARY"
          case "$rc" in
            0)
              echo "Homebrew readiness passed." >> "$GITHUB_STEP_SUMMARY"
              ;;
            2)
              echo "::warning ::Homebrew readiness has approval/external-state blockers."
              echo "Homebrew readiness has approval/external-state blockers." >> "$GITHUB_STEP_SUMMARY"
              ;;
            *)
              exit "$rc"
              ;;
          esac
